# Combatant command areas of responsibility / interest.
#
# This file drives the AOR tagger. Edits should be reviewed by an
# analyst who understands the CCMD structure — keyword lists are
# intentionally broad in the prototype to favor recall over precision;
# precision is tuned by the scoring function in aor_tagger.py.
#
# Field definitions:
#   code                : canonical short name used in URLs and DB keys.
#   name                : full command name for display.
#   aor_type            : "geographic" | "functional".
#   description         : one-line summary shown in the About tab.
#   countries           : ISO-3166 alpha-2 codes (geographic commands only).
#   regional_keywords   : cities, ranges, waterways, op names, bases, fleet
#                         designators, unit designators — anything a GPE/ORG
#                         NER model is likely to emit for this AOR.
#   functional_domains  : domain terms unique to a functional command.
#   adversary_keywords  : adversary/competitor force designators commonly
#                         tied to the AOR (used as strong signal during
#                         scoring).
#
# The prototype ships the four AORs below fully populated as required
# by build step 1 (>= 3 CCMDs). The remaining seven are stubbed so the
# DB seeds all 11 — step 3 will expand these.

