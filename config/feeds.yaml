# Feed catalog.
#
# source_tier semantics:
#   1 = USG official (service / CCMD / DoD public affairs)
#   2 = professional defense trade press
#   3 = wire services, regional press, state-affiliated media
#
# Feeds with ``todo: true`` are URL placeholders — the ingest CLI will
# skip them until an analyst verifies the URL, updates this file, and
# re-runs ``dashboard init-db`` (or a future ``dashboard feeds reload``).
#
# state_affiliation is populated (ISO-3166 alpha-2) for feeds that are
# known instruments of a specific government's messaging apparatus.
# The UI badges these feeds distinctly; the MDM scorer weights them.

feeds:
  # --- Tier 1: USG official --------------------------------------------------
  - name: DoD News
    url: https://www.defense.gov/DesktopModules/ArticleCS/RSS.ashx?ContentType=1&Site=945&max=20
    source_tier: 1
    notes: defense.gov top news RSS.
